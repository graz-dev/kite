site_name: Kite — Kubernetes Resource Rightsizing Operator
site_description: >
  Kite is an operator-based Kubernetes resource rightsizing tool.
  It uses the metrics-server to collect workload usage history and
  automatically opens pull requests in your GitOps repository to apply
  the recommended CPU and memory settings.
site_url: https://graz-dev.github.io/kite/
repo_url: https://github.com/graz-dev/kite
repo_name: graz-dev/kite
edit_uri: edit/main/docs/public/docs/

docs_dir: docs
site_dir: ../../site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/kite-logo.svg
  favicon: assets/kite-logo.svg
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Quick Start: quick-start.md
  - Configuration:
      - OptimizationTarget: configuration.md
      - GitOps Integration: gitops.md
  - Algorithm:
      - How It Works: algorithm.md
  - Reference:
      - CRD Reference: crd-reference.md
      - FAQ: faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/graz-dev/kite
  version:
    provider: mike
